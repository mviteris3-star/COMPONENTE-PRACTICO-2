{% if contactos %}
    <div class="lista-grupo">
        {% for contacto in contactos %}
            <div class="contacto-item">
                <div class="contacto-info">
                    <h5 class="contacto-nombre">{{ contacto.nombre }}</h5>
                    <p class="contacto-detalle"><strong>Email:</strong> {{ contacto.correo }}</p>
                    <p class="contacto-detalle"><strong>Teléfono:</strong> {{ contacto.telefono }}</p>
                </div>
                <div class="contacto-acciones">
                    <a href="{% url 'editar' contacto.id %}" class="btn-accion btn-editar">Editar</a>
                    <a href="{% url 'eliminar' contacto.id %}" class="btn-accion btn-eliminar" onclick="return confirm('¿Estás seguro de eliminar este contacto?')">Eliminar</a>
                </div>
            </div>
        {% endfor %}
    </div>
{% else %}
    <p class="sin-contactos">No se encontraron contactos.</p>
{% endif %}
